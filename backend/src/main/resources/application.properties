spring.application.name=backend

# === Database connection ===
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/lichsuvn?useSSL=false&connectionTimeZone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET time_zone = '+07:00'

# === JPA / Hibernate ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.open-in-view=false

# === Flyway Migration ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# === Optional: Logging level for debug ===
logging.level.org.flywaydb=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# === Auth / JWT ===
app.jwt.secret=${APP_JWT_SECRET}
app.jwt.access-token-minutes=15
app.jwt.refresh-token-days=7
app.frontend-base-url=${APP_FRONTEND_BASE_URL:${APP_FRONTEND_SECURE_URL:https://localhost:5173}}
app.auth.email-verification-minutes=${APP_AUTH_EMAIL_VERIFICATION_MINUTES:10}

# === Social OAuth ===
# Google: set APP_AUTH_GOOGLE_CLIENT_ID to your OAuth 2.0 Web Client ID from Google Cloud Console.
# Without this, the /api/auth/oauth/google endpoint returns 503 with OAUTH_NOT_CONFIGURED.
app.oauth.google.client-id=${APP_AUTH_GOOGLE_CLIENT_ID:}

# Facebook: set APP_AUTH_FACEBOOK_APP_ID and APP_AUTH_FACEBOOK_APP_SECRET from Meta Developer Console.
# APP_AUTH_FACEBOOK_GRAPH_VERSION is optional; defaults to v21.0.
# Without these, the /api/auth/oauth/facebook endpoint returns 503 with OAUTH_NOT_CONFIGURED.
app.oauth.facebook.app-id=${APP_AUTH_FACEBOOK_APP_ID:}
app.oauth.facebook.app-secret=${APP_AUTH_FACEBOOK_APP_SECRET:}
app.oauth.facebook.graph-version=${APP_AUTH_FACEBOOK_GRAPH_VERSION:v21.0}

# === Mail / SMTP ===
# Keep credentials in environment variables. For Gmail use port 587 + STARTTLS.
app.mail.enabled=${APP_MAIL_ENABLED:false}
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
